# ============================================================
# azure-pipelines.yml — Root Pipeline
# E-Commerce Platform: Infrastructure deployment +
# triggers for all service pipelines
# ============================================================

trigger:
  branches:
    include:
      - main
      - staging
      - develop
  paths:
    include:
      - infra/**
      - azure-pipelines.yml

pr:
  branches:
    include:
      - main
      - staging
      - develop
  paths:
    include:
      - infra/**

# ─── Pipeline Resources (service pipelines) ───────────────────────────────────
resources:
  pipelines:
    - pipeline: product-service-pipeline
      source: 'product-service'
      trigger:
        branches:
          include:
            - main
            - staging

    - pipeline: order-service-pipeline
      source: 'order-service'
      trigger:
        branches:
          include:
            - main
            - staging

    - pipeline: invoice-service-pipeline
      source: 'invoice-service'
      trigger:
        branches:
          include:
            - main
            - staging

    - pipeline: ecommerce-ui-pipeline
      source: 'ecommerce-ui'
      trigger:
        branches:
          include:
            - main
            - staging

# ─── Variables ────────────────────────────────────────────────────────────────
variables:
  - group: ecommerce-global-vars   # Variable group in Azure DevOps Library
  # Contains: AZURE_SUBSCRIPTION_ID, AZURE_TENANT_ID, RESOURCE_GROUP_DEV,
  #           RESOURCE_GROUP_STAGING, RESOURCE_GROUP_PROD,
  #           POSTGRES_ADMIN_PASSWORD (secret), APIM_PUBLISHER_EMAIL,
  #           AAD_TENANT_ID, AAD_API_CLIENT_ID, UI_ORIGIN

  - name: bicepParametersFile
    value: 'infra/parameters.json'

  - name: bicepMainFile
    value: 'infra/main.bicep'

# ─── Stage: Validate Bicep ────────────────────────────────────────────────────
stages:
  - stage: ValidateBicep
    displayName: 'Validate Bicep Templates'
    condition: always()
    jobs:
      - job: BicepLint
        displayName: 'Bicep Lint & What-If'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: 'Install Bicep CLI'
            inputs:
              azureSubscription: 'ecommerce-azure-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az bicep install
                az bicep version

          - task: AzureCLI@2
            displayName: 'Bicep Build (lint check)'
            inputs:
              azureSubscription: 'ecommerce-azure-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az bicep build --file $(bicepMainFile)
                echo "Bicep build completed successfully."

          - task: AzureCLI@2
            displayName: 'What-If against Dev resource group'
            condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
            inputs:
              azureSubscription: 'ecommerce-azure-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az deployment group what-if \
                  --subscription $(AZURE_SUBSCRIPTION_ID) \
                  --resource-group $(RESOURCE_GROUP_DEV) \
                  --template-file $(bicepMainFile) \
                  --parameters $(bicepParametersFile) \
                  --parameters environment=dev \
                               postgresAdminPassword=$(POSTGRES_ADMIN_PASSWORD) \
                               apimPublisherEmail=$(APIM_PUBLISHER_EMAIL) \
                               aadTenantId=$(AAD_TENANT_ID) \
                               aadApiClientId=$(AAD_API_CLIENT_ID) \
                               uiOrigin=$(UI_ORIGIN)

  # ─── Stage: Deploy to Dev ──────────────────────────────────────────────────
  - stage: DeployDev
    displayName: 'Deploy Infrastructure — Dev'
    dependsOn: ValidateBicep
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    variables:
      targetEnvironment: 'dev'
      targetResourceGroup: $(RESOURCE_GROUP_DEV)
    jobs:
      - deployment: DeployBicepDev
        displayName: 'Bicep Deploy to Dev'
        environment: 'dev'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: 'Deploy Bicep — Dev'
                  inputs:
                    azureSubscription: 'ecommerce-azure-connection'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az bicep install

                      DEPLOYMENT_OUTPUT=$(az deployment group create \
                        --subscription $(AZURE_SUBSCRIPTION_ID) \
                        --resource-group $(targetResourceGroup) \
                        --template-file $(bicepMainFile) \
                        --parameters $(bicepParametersFile) \
                        --parameters environment=$(targetEnvironment) \
                                     postgresAdminPassword=$(POSTGRES_ADMIN_PASSWORD) \
                                     apimPublisherEmail=$(APIM_PUBLISHER_EMAIL) \
                                     aadTenantId=$(AAD_TENANT_ID) \
                                     aadApiClientId=$(AAD_API_CLIENT_ID) \
                                     uiOrigin=$(UI_ORIGIN) \
                        --name "ecommerce-$(targetEnvironment)-$(Build.BuildId)" \
                        --output json)

                      echo "Deployment outputs:"
                      echo "$DEPLOYMENT_OUTPUT" | jq '.properties.outputs'

                      # Export outputs as pipeline variables for downstream use
                      AKS_CLUSTER=$(echo "$DEPLOYMENT_OUTPUT" | jq -r '.properties.outputs.aksClusterName.value')
                      ACR_SERVER=$(echo "$DEPLOYMENT_OUTPUT" | jq -r '.properties.outputs.acrLoginServer.value')
                      echo "##vso[task.setvariable variable=aksClusterName;isOutput=true]$AKS_CLUSTER"
                      echo "##vso[task.setvariable variable=acrLoginServer;isOutput=true]$ACR_SERVER"

  # ─── Stage: Deploy to Staging ─────────────────────────────────────────────
  - stage: DeployStaging
    displayName: 'Deploy Infrastructure — Staging'
    dependsOn: ValidateBicep
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/staging'))
    variables:
      targetEnvironment: 'staging'
      targetResourceGroup: $(RESOURCE_GROUP_STAGING)
    jobs:
      - deployment: DeployBicepStaging
        displayName: 'Bicep Deploy to Staging'
        environment: 'staging'   # Requires approval from tech lead
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: 'Deploy Bicep — Staging'
                  inputs:
                    azureSubscription: 'ecommerce-azure-connection'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az bicep install

                      az deployment group create \
                        --subscription $(AZURE_SUBSCRIPTION_ID) \
                        --resource-group $(targetResourceGroup) \
                        --template-file $(bicepMainFile) \
                        --parameters $(bicepParametersFile) \
                        --parameters environment=$(targetEnvironment) \
                                     postgresAdminPassword=$(POSTGRES_ADMIN_PASSWORD) \
                                     apimPublisherEmail=$(APIM_PUBLISHER_EMAIL) \
                                     aadTenantId=$(AAD_TENANT_ID) \
                                     aadApiClientId=$(AAD_API_CLIENT_ID) \
                                     uiOrigin=$(UI_ORIGIN) \
                        --name "ecommerce-$(targetEnvironment)-$(Build.BuildId)"

  # ─── Stage: Deploy to Prod ────────────────────────────────────────────────
  - stage: DeployProd
    displayName: 'Deploy Infrastructure — Prod'
    dependsOn: DeployStaging
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    variables:
      targetEnvironment: 'prod'
      targetResourceGroup: $(RESOURCE_GROUP_PROD)
    jobs:
      - deployment: DeployBicepProd
        displayName: 'Bicep Deploy to Prod'
        environment: 'prod'   # Requires two approvals
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: 'Deploy Bicep — Prod'
                  inputs:
                    azureSubscription: 'ecommerce-azure-connection'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az bicep install

                      az deployment group create \
                        --subscription $(AZURE_SUBSCRIPTION_ID) \
                        --resource-group $(targetResourceGroup) \
                        --template-file $(bicepMainFile) \
                        --parameters $(bicepParametersFile) \
                        --parameters environment=$(targetEnvironment) \
                                     postgresAdminPassword=$(POSTGRES_ADMIN_PASSWORD) \
                                     apimPublisherEmail=$(APIM_PUBLISHER_EMAIL) \
                                     aadTenantId=$(AAD_TENANT_ID) \
                                     aadApiClientId=$(AAD_API_CLIENT_ID) \
                                     uiOrigin=$(UI_ORIGIN) \
                        --name "ecommerce-$(targetEnvironment)-$(Build.BuildId)"

                - task: AzureCLI@2
                  displayName: 'Verify AKS cluster reachable'
                  inputs:
                    azureSubscription: 'ecommerce-azure-connection'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      RESOURCE_GROUP=$(targetResourceGroup)
                      CLUSTER_NAME=$(az aks list -g $RESOURCE_GROUP --query '[0].name' -o tsv)
                      az aks get-credentials --resource-group $RESOURCE_GROUP --name $CLUSTER_NAME --overwrite-existing
                      kubectl get nodes
                      echo "AKS cluster is reachable."

  # ─── Stage: Smoke Test (post-prod) ────────────────────────────────────────
  - stage: SmokeTest
    displayName: 'Post-Deployment Smoke Test'
    dependsOn: DeployProd
    condition: succeeded()
    jobs:
      - job: SmokeTest
        displayName: 'API Health Checks'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: AzureCLI@2
            displayName: 'Check APIM gateway health'
            inputs:
              azureSubscription: 'ecommerce-azure-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                APIM_URL=$(az apim list -g $(RESOURCE_GROUP_PROD) --query '[0].gatewayUrl' -o tsv)
                echo "APIM Gateway URL: $APIM_URL"

                HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APIM_URL/api/products/")
                if [ "$HTTP_STATUS" -eq 401 ]; then
                  echo "APIM gateway is responding (401 = auth required, as expected without token)"
                  exit 0
                else
                  echo "Unexpected status: $HTTP_STATUS"
                  exit 1
                fi
