# ============================================================
# azure-pipelines.yml — Root Pipeline (Infrastructure only)
# Runs Terraform plan/apply for Azure infrastructure.
# Each microservice has its own pipeline in its own repo.
#
# SETUP REQUIRED in Azure DevOps:
# 1. Service connection to Azure named 'ecommerce-azure-connection'
#    (Project Settings → Service connections → Azure Resource Manager)
# 2. Variable group named 'ecommerce-global-vars' with:
#    - AZURE_SUBSCRIPTION_ID
#    - RESOURCE_GROUP_NAME   (your existing resource group)
#    - TF_STATE_RG           (resource group where TF state storage lives)
#    - TF_STATE_SA           (storage account name for TF state)
# ============================================================

trigger: none   # Manual trigger only — run from Azure DevOps UI
pr: none        # No automatic PR builds

variables:
  - group: ecommerce-global-vars
  - name: TF_DIR
    value: 'infra'
  - name: TF_VERSION
    value: '1.6.6'

stages:

  # ─── Stage 1: Terraform Init + Plan ───────────────────────────────────────
  - stage: TerraformPlan
    displayName: 'Terraform Plan'
    jobs:
      - job: Plan
        displayName: 'terraform init + plan'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: 'Install Terraform $(TF_VERSION)'
            inputs:
              terraformVersion: '$(TF_VERSION)'

          - task: TerraformTaskV4@4
            displayName: 'terraform init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(TF_DIR)'
              backendServiceArm: 'ecommerce-azure-connection'
              backendAzureRmResourceGroupName: '$(TF_STATE_RG)'
              backendAzureRmStorageAccountName: '$(TF_STATE_SA)'
              backendAzureRmContainerName: 'tfstate'
              backendAzureRmKey: 'ecommerce.terraform.tfstate'

          - task: TerraformTaskV4@4
            displayName: 'terraform plan'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              workingDirectory: '$(TF_DIR)'
              environmentServiceNameAzureRM: 'ecommerce-azure-connection'
              commandOptions: '-var-file="terraform.tfvars" -out=tfplan'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish tfplan artifact'
            inputs:
              targetPath: '$(TF_DIR)/tfplan'
              artifact: 'tfplan'

  # ─── Stage 2: Terraform Apply (manual approval recommended) ───────────────
  - stage: TerraformApply
    displayName: 'Terraform Apply'
    dependsOn: TerraformPlan
    condition: succeeded()
    jobs:
      - deployment: Apply
        displayName: 'terraform apply'
        pool:
          vmImage: 'ubuntu-latest'
        environment: 'infrastructure'   # Add approval gate here in Azure DevOps UI
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  displayName: 'Install Terraform $(TF_VERSION)'
                  inputs:
                    terraformVersion: '$(TF_VERSION)'

                - task: DownloadPipelineArtifact@2
                  displayName: 'Download tfplan'
                  inputs:
                    artifact: 'tfplan'
                    targetPath: '$(TF_DIR)'

                - task: TerraformTaskV4@4
                  displayName: 'terraform init'
                  inputs:
                    provider: 'azurerm'
                    command: 'init'
                    workingDirectory: '$(TF_DIR)'
                    backendServiceArm: 'ecommerce-azure-connection'
                    backendAzureRmResourceGroupName: '$(TF_STATE_RG)'
                    backendAzureRmStorageAccountName: '$(TF_STATE_SA)'
                    backendAzureRmContainerName: 'tfstate'
                    backendAzureRmKey: 'ecommerce.terraform.tfstate'

                - task: TerraformTaskV4@4
                  displayName: 'terraform apply'
                  inputs:
                    provider: 'azurerm'
                    command: 'apply'
                    workingDirectory: '$(TF_DIR)'
                    environmentServiceNameAzureRM: 'ecommerce-azure-connection'
                    commandOptions: 'tfplan'
